<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Leaderboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    table {
      margin: 30px auto;
      border-collapse: collapse;
      width: 80%;
      max-width: 800px;
      background: #161b22;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #30363d;
    }

    th {
      background: #21262d;
    }

    tr:hover {
      background: #1f2933;
    }

    .gold { color: gold; font-weight: bold; }
    .silver { color: silver; font-weight: bold; }
    .bronze { color: #cd7f32; font-weight: bold; }

  </style>
</head>
<body>

  <h1>🏆 GitHub Leaderboard</h1>

  <div style="margin: 20px;">
    <input 
        id="user-input" 
        type="text" 
        placeholder="Enter usernames (comma separated)" 
        style="padding:10px; width:300px; border-radius:5px; border:none;"
    >
    
    <button onclick="loadLeaderboard()" 
        style="padding:10px 15px; margin-left:10px; border:none; border-radius:5px; cursor:pointer;">
        Compare
    </button>
</div>

  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Score</th>
        <th>Followers</th>
        <th>Repos</th>
        <th>Stars</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body"></tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
